<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoughAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
    <div class="splash-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
    </div>
    <div class="splash-core">
        <div class="splash-icon">
            <svg width="32" height="32" viewBox="0 0 36 20" fill="none">
                <path d="M0 10 H6 L9 2 L12 18 L15 6 L18 14 L21 10 H36"
                      stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <p class="splash-name">CoughAI</p>
    </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app" class="app-hidden">

    <div class="safe-top"></div>

    <!-- Header -->
    <header class="page-header">
        <p class="page-eyebrow" id="app-date"></p>
        <h1 class="page-title">วิเคราะห์การไอ</h1>
    </header>

    <main class="page-scroll">

        <!-- Summary banner (Health-style) -->
        <div class="banner stagger-1">
            <div class="banner-icon">
                <svg width="18" height="18" viewBox="0 0 36 20" fill="none">
                    <path d="M0 10 H6 L9 2 L12 18 L15 6 L18 14 L21 10 H36"
                          stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="banner-text">
                <p class="banner-title">บันทึกหรืออัปโหลดเสียงไอ</p>
                <p class="banner-sub">วิเคราะห์ด้วย AI · ผลภายใน 5 วินาที</p>
            </div>
        </div>

        <!-- Section label -->
        <p class="group-label stagger-2">เริ่มต้น</p>

        <!-- Input tiles -->
        <div class="tiles stagger-2" id="input-section">

            <!-- Record -->
            <div class="tile" id="record-section">
                <div class="tile-header">
                    <span class="chip chip-teal">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="22"/>
                        </svg>
                    </span>
                    <span class="tile-label">บันทึกเสียง</span>
                </div>
                <p class="tile-big">5 <span class="tile-unit">วินาที</span></p>
                <p class="tile-desc">กดปุ่ม แล้วไอใส่ไมค์</p>

                <div class="wave-track">
                    <div class="wave-fill" id="audio-bar"></div>
                    <span class="wave-hint" id="waveform-label">รอสัญญาณเสียง</span>
                </div>

                <button id="record-button" class="action-btn action-teal">
                    <span class="rec-dot"></span>
                    <span id="record-text">เริ่มบันทึก</span>
                </button>
            </div>

            <!-- Divider -->
            <div class="tile-divider">
                <span>หรือ</span>
            </div>

            <!-- Upload -->
            <div class="tile" id="upload-section">
                <div class="tile-header">
                    <span class="chip chip-orange">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </span>
                    <span class="tile-label">อัปโหลด</span>
                </div>
                <p class="tile-big">ไฟล์เสียง</p>
                <p class="tile-desc">.wav · .mp3 · .webm</p>

                <label for="audio-upload" class="drop-zone" id="drop-zone">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.35">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="11" x2="12" y2="17"/>
                        <line x1="9" y1="14" x2="15" y2="14"/>
                    </svg>
                    <span class="drop-hint">แตะเพื่อเลือกไฟล์</span>
                    <span id="file-name" class="drop-chosen"></span>
                </label>
                <input type="file" id="audio-upload" accept="audio/*" style="display:none">
            </div>

        </div>

        <!-- ── Result ── -->
        <div id="result-section" style="display:none">

            <p class="group-label">ผลวิเคราะห์</p>

            <!-- Loading -->
            <div class="result-loading" id="result-loading">
                <div class="ios-spinner">
                    <div></div><div></div><div></div><div></div>
                    <div></div><div></div><div></div><div></div>
                </div>
                <p id="status-message" class="loading-label">กำลังวิเคราะห์...</p>
            </div>

            <!-- Result tile -->
            <div class="tile result-tile" id="result-card" style="display:none">
                <div class="result-top">
                    <div class="result-badge" id="result-badge">
                        <svg id="badge-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="result-info">
                        <p class="result-category">การวินิจฉัย</p>
                        <p class="result-label" id="prediction-label">—</p>
                    </div>
                </div>

                <p class="result-conf" id="confidence-score"></p>

                <div class="h-divider"></div>

                <p class="prob-head">ความน่าจะเป็น</p>
                <div id="probability-bar-container"></div>

                <button id="reset-button" class="ghost-btn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    วิเคราะห์อีกครั้ง
                </button>
            </div>
        </div>

        <div style="height:60px"></div>
    </main>

</div>

<!-- Modal (iOS action sheet style) -->
<div id="message-modal" class="sheet-overlay" style="display:none">
    <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>
        <h3 id="modal-title" class="sheet-title"></h3>
        <p id="modal-message" class="sheet-msg"></p>
        <button id="modal-ok-button" class="action-btn action-teal" style="width:100%;justify-content:center">ตกลง</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
